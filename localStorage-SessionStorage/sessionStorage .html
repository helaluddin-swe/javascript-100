<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Session Storage Manager</title>
    <style>
        /* Modern Reset & Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        /* Container Card */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #2c3e50;
            font-weight: 600;
        }

        /* Button Grouping */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Standard Button Styling */
        button {
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
            background-color: #3498db;
            color: white;
            outline: none;
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        /* Secondary & Danger variants */
        .btn-get { background-color: #2ecc71; }
        .btn-get:hover { background-color: #27ae60; }

        .btn-remove { background-color: #e67e22; }
        .btn-remove:hover { background-color: #d35400; }

        .btn-clear { 
            background-color: #e74c3c; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .btn-clear:hover { background-color: #c0392b; }

        /* Output Display Area */
        #display {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            background: #f9f9f9;
            border-left: 4px solid #3498db;
            font-family: monospace;
            min-height: 20px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Session Storage Manager</h2>
        
        <div class="button-group">
            <button onclick="setSessionStorage('name', 'Helal Uddin')">Set Name</button>
            <button onclick="setSessionStorage('username', 'helaludddin-swe')">Set Username</button>
            
            <button class="btn-get" onclick="getSessionStorage('name')">Get Name</button>
            <button class="btn-get" onclick="getSessionStorage('username')">Get Username</button>
            
            <button class="btn-remove" onclick="removeSessionStorage('name')">Remove Name</button>
            <button class="btn-clear" onclick="clearSessionStorage()">Clear All Storage</button>
        </div>

        <div id="display"></div>
    </div>
    <script src="./sessionStorage.js"></script>
  </body>
</html>
